# nixpacks.toml
[phases.install]
cmds = ["pip install --upgrade pip && pip install -e '.'"]

[phases.build]
cmds = ["bash -c 'python -m cli.main build --refresh --username southwestmogrown --embedder openai --token $GITHUB_TOKEN'"]

[start]
cmd = "python -m cli.main serve --username southwestmogrown --llm anthropic --port $PORT"